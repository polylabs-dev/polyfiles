escir: "0.8.1"
name: poly-data-chunk
version: "1.0.0"
lex: polylabs.data.chunk
target: wasm-client

description: |
  Client-side file chunking and erasure coding circuit. Splits files into
  4 MB chunks, applies k-of-n erasure coding per classification level,
  and reassembles on download. Runs in WASM.

emissions:
  - name: chunk_telemetry
    path: "lex://estream/apps/polylabs.data/telemetry"
    annotations:
      - "@streamsight_filter: baseline"
      - "@streamsight_sensitivity: 2.0"
      - "@streamsight_warmup: 1000"

exports:
  - fn: chunk_file
    desc: "Split file into 4 MB chunks"
    params:
      - name: file_data
        type: "bytes"
    returns: "Vec<Chunk>"

  - fn: erasure_encode
    desc: "Erasure-code chunks (k-of-n per classification)"
    params:
      - name: chunks
        type: "Vec<Chunk>"
      - name: k
        type: "u8"
      - name: n
        type: "u8"
    returns: "Vec<Shard>"
    telemetry:
      - "ctx.streamsight.gauge('polydata.erasure.encode_ns', elapsed)"

  - fn: erasure_decode
    desc: "Reassemble k-of-n shards into original chunks"
    params:
      - name: shards
        type: "Vec<Shard>"
      - name: k
        type: "u8"
    returns: "Vec<Chunk>"

  - fn: reassemble_file
    desc: "Reassemble chunks into original file"
    params:
      - name: chunks
        type: "Vec<Chunk>"
    returns: "bytes"
