escir: "0.8.1"
name: poly-data-classify
version: "1.0.0"
lex: polylabs.data.classify
target: wasm-client

description: |
  Client-side classification circuit. Assigns classification tags to files
  via manual, inherited, ESLM auto, or policy-based methods. Parses
  .polyclassification files and looks up scatter policy for each level.

emissions:
  - name: classify_telemetry
    path: "lex://estream/apps/polylabs.data/telemetry"
    annotations:
      - "@streamsight_filter: baseline"
      - "@streamsight_sensitivity: 2.5"
      - "@streamsight_warmup: 500"

exports:
  - fn: classify_file
    desc: "Assign classification tag (manual, inherited, auto, policy)"
    params:
      - name: file_path
        type: "string"
      - name: parent_classification
        type: "Option<Classification>"
      - name: policy
        type: "Option<ClassificationPolicy>"
    returns: "Classification"
    telemetry:
      - "ctx.streamsight.counter('polydata.classify.changes_total', 1)"
      - "ctx.streamsight.event(ClassifyEvent { file_id, old_tag, new_tag, source })"

  - fn: parse_polyclassification
    desc: "Parse .polyclassification file for path-based classification"
    params:
      - name: content
        type: "string"
    returns: "Vec<ClassificationRule>"

  - fn: lookup_scatter_policy
    desc: "Return k-of-n and jurisdiction count for classification level"
    params:
      - name: classification
        type: "Classification"
    returns: "ScatterPolicy { k: u8, n: u8, jurisdictions: u8 }"

  - fn: validate_classification
    desc: "Validate classification meets minimum policy requirements"
    params:
      - name: classification
        type: "Classification"
      - name: policy
        type: "ClassificationPolicy"
    returns: "bool"

types:
  Classification:
    enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED, SOVEREIGN]

  ScatterPolicy:
    PUBLIC:      { k: 2, n: 3, jurisdictions: 1 }
    INTERNAL:    { k: 3, n: 5, jurisdictions: 2 }
    CONFIDENTIAL: { k: 5, n: 7, jurisdictions: 3 }
    RESTRICTED:  { k: 7, n: 9, jurisdictions: 3 }
    SOVEREIGN:   { k: 9, n: 13, jurisdictions: 5 }
