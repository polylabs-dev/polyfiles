escir: "0.8.1"
name: poly-data-encrypt
version: "1.0.0"
lex: polylabs.data.encrypt
target: wasm-client

description: |
  Client-side file encryption circuit. Generates per-file AES-256-GCM keys,
  wraps them with SPARK-derived ML-KEM-1024 user keys, and encrypts/decrypts
  file chunks. All operations run in WASM — keys never leave the client.

emissions:
  - name: encrypt_telemetry
    path: "lex://estream/apps/polylabs.data/telemetry"
    annotations:
      - "@streamsight_filter: baseline"
      - "@streamsight_sensitivity: 2.0"
      - "@streamsight_warmup: 1000"
      - "@streamsight_sample_normal: 0.001"

exports:
  - fn: generate_file_key
    desc: "Generate random AES-256-GCM per-file key"
    returns: "FileKey (32 bytes)"

  - fn: wrap_file_key
    desc: "Wrap per-file key with SPARK ML-KEM-1024 public key"
    params:
      - name: file_key
        type: "FileKey"
      - name: spark_kem_public
        type: "MlKem1024PublicKey"
    returns: "WrappedFileKey"

  - fn: unwrap_file_key
    desc: "Unwrap per-file key with SPARK ML-KEM-1024 private key"
    params:
      - name: wrapped_key
        type: "WrappedFileKey"
      - name: spark_kem_private
        type: "MlKem1024PrivateKey"
    returns: "FileKey"

  - fn: encrypt_chunk
    desc: "Encrypt chunk with per-file AES-256-GCM key"
    params:
      - name: chunk
        type: "bytes"
      - name: file_key
        type: "FileKey"
      - name: chunk_index
        type: "u32"
    returns: "EncryptedChunk"
    telemetry:
      - "ctx.streamsight.gauge('polydata.encrypt.chunk_ns', elapsed)"

  - fn: decrypt_chunk
    desc: "Decrypt chunk with per-file AES-256-GCM key"
    params:
      - name: encrypted_chunk
        type: "EncryptedChunk"
      - name: file_key
        type: "FileKey"
    returns: "bytes"

  - fn: rewrap_file_key
    desc: "Re-wrap per-file key for share recipient's SPARK ML-KEM-1024 key"
    params:
      - name: file_key
        type: "FileKey"
      - name: recipient_kem_public
        type: "MlKem1024PublicKey"
    returns: "WrappedFileKey"
