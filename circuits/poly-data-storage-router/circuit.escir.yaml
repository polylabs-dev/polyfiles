escir: "0.8.1"
name: poly-data-storage-router
version: "1.0.0"
lex: polylabs.data.router
target: lattice

description: |
  Server-side storage router circuit. Validates manifest signatures, enforces
  classification scatter policies, distributes shards via VRF-directed scatter,
  records manifests to version circuit, and updates file indices.

emissions:
  - name: router_telemetry
    path: "lex://estream/apps/polylabs.data/telemetry"
    annotations:
      - "@streamsight_filter: baseline"
      - "@streamsight_sensitivity: 2.0"
      - "@streamsight_warmup: 1000"
      - "@streamsight_sample_normal: 0.001"

stream:
  - topic: "polylabs.data.{user_id}.upload"
    pattern: scatter
    retention: permanent
    hash_chain: true
    signature_required: true

  - topic: "polylabs.data.{user_id}.download"
    pattern: request_reply
    retention: none
    signature_required: true

  - topic: "polylabs.data.{user_id}.upload.confirm"
    pattern: scatter
    retention: ephemeral
    signature_required: false

fsm:
  initial_state: uploading
  states:
    uploading:
      transitions:
        - event: chunks_encrypted
          target: scattering
    scattering:
      transitions:
        - event: scatter_complete
          target: stored
        - event: scatter_failed
          target: retry
    retry:
      transitions:
        - event: retry_success
          target: scattering
        - event: retry_exhausted
          target: failed
    stored:
      transitions:
        - event: share_created
          target: shared
        - event: version_created
          target: versioned
        - event: deleted
          target: purging
    shared:
      transitions:
        - event: share_revoked
          target: stored
    versioned:
      transitions:
        - event: new_version
          target: stored
    purging:
      transitions:
        - event: all_shards_deleted
          target: purged
    failed:
      transitions: []
    purged:
      transitions: []

telemetry:
  counters:
    - "polydata.uploads_total"
    - "polydata.downloads_total"
    - "polydata.shard.failure_total"
  gauges:
    - "polydata.upload.latency_ns"
    - "polydata.download.latency_ns"
    - "polydata.scatter.duration_ns"
