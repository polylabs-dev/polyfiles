[package]
name = "polyfiles"
version = "0.12.0"
description = "Scatter-distributed encrypted file storage with PQ cryptography and zero-linkage privacy"
license = "LicenseRef-PolyQuantum-Commercial"
repository = "https://github.com/polylabs-dev/polyfiles"

[publisher]
id = "polylabs-dev"
name = "Poly Labs"
signing_key_id = "polylabs-prime-v1"

[flir]
api_version = "0.22.0"
min_platform_version = "0.22.0"

[dependencies]
polykit = ">=0.3.0"

[pricing]
license_type = "per-invocation"
share_price = "0.0004"
private_price = "0.0006"

[telemetry]
schema_hash = "auto"

[telemetry.metrics]
file_operations = "counter"
storage_bytes = "gauge"
scatter_stores = "counter"
version_creates = "counter"
share_grants = "counter"
encrypt_ops = "counter"
dedup_hits = "counter"
dedup_savings_bytes = "gauge"
rbac_checks = "counter"

[telemetry.privacy]
aggregate_window = "1h"
cohort_min_size = 50
noise_budget = "1.0"

[component.include]
circuits = ["circuits/fl/*.fl", "circuits/fl/graphs/*.fl", "circuits/graphs/*.fl"]
tests = ["test_vectors/*.esz"]
docs = ["docs/*.md"]
