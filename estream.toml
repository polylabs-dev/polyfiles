[platform]
version = "0.22.0"
min_version = "0.22.0"

[project]
name = "qfiles"
description = "Scatter-distributed encrypted file storage with PQ cryptography and zero-linkage privacy"
organization = "polylabs-dev"
repository = "https://github.com/polylabs-dev/qfiles"

[build]
circuits = "circuits/fl/**/*.fl"
output = ".es/build"
target = ["wasm", "lattice"]

[build.flir]
api_version = "0.22.0"
emit_ir = true
optimization_level = 2

[build.codegen]
rust = true
wasm = true
typescript_types = true

[dependencies]
qkit = { version = ">=0.3.0", path = "../qkit" }

[lex]
root = "esn/global/org/polyqlabs/files"

[cortex]
default_alert_team = "files-team"
infer_on_write = true
anomaly_detection = true

[telemetry]
schema_hash = "auto"
streamsight = true
blind_relay = true
cohort_min_size = 50

[testing]
test_vectors = "test_vectors/"
fuzz_targets = true
kat_vectors = true
golden_tests = true
